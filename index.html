
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setmandu - Find Your Perfect Nepali Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05020a;
            --accent-purple: #7C3AED;
            --accent-gold: #f8b500;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-deep);
            color: white;
            overflow-x: hidden;
            margin: 0;
        }
        .atmosphere {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(248, 181, 0, 0.05) 0%, transparent 50%);
            filter: blur(60px);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .rose-gold-text {
            background: linear-gradient(135deg, #fceabb 0%, #f8b500 50%, #fceabb 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .heart-particle {
            position: fixed;
            color: var(--accent-purple);
            pointer-events: none;
            z-index: 0;
            animation: floating-hearts 15s linear infinite;
        }
        @keyframes floating-hearts {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .pulse-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .gradient-border-glow {
            position: relative;
            z-index: 1;
        }
        .gradient-border-glow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #7C3AED, #f8b500, #7C3AED);
            z-index: -1;
            border-radius: inherit;
            opacity: 0.3;
            filter: blur(12px);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="atmosphere"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
